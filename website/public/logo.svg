<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
  </defs>
  
  <!-- Network links -->
  <line x1="50" y1="20" x2="80" y2="50" stroke="url(#glow)" stroke-width="2" stroke-dasharray="2,2" />
  <line x1="80" y1="50" x2="50" y2="80" stroke="url(#glow)" stroke-width="2" stroke-dasharray="2,2" />
  <line x1="50" y1="80" x2="20" y2="50" stroke="url(#glow)" stroke-width="2" stroke-dasharray="2,2" />
  <line x1="20" y1="50" x2="50" y2="20" stroke="url(#glow)" stroke-width="2" stroke-dasharray="2,2" />
  <line x1="20" y1="50" x2="80" y2="50" stroke="url(#glow)" stroke-width="1.5" opacity="0.5" />
  <line x1="50" y1="20" x2="50" y2="80" stroke="url(#glow)" stroke-width="1.5" opacity="0.5" />

  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="160 60" />
  
  <!-- Central node -->
  <circle cx="50" cy="50" r="10" fill="#0c101b" stroke="url(#glow)" stroke-width="3" />
  
  <!-- Outer nodes -->
  <circle cx="50" cy="20" r="4.5" fill="#00f2fe" />
  <circle cx="80" cy="50" r="4.5" fill="#7f00ff" />
  <circle cx="50" cy="80" r="4.5" fill="#ff007f" />
  <circle cx="20" cy="50" r="4.5" fill="#00f2fe" />
</svg>
