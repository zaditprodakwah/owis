name: Publish OWIS to GitHub Packages

on:
  push:
    tags:
      - 'v*'   # trigger on tags like v0.2.0

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we get the full history for tag resolution
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # LTS version
          registry-url: https://npm.pkg.github.com
          scope: '@zaditprodakwah'

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
