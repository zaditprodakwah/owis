name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Schema Validation
      run: node website/scripts/validate-json.js
    
    - name: Runtime Tests
      run: npm test
      working-directory: runtime
    
    - name: CLI Tests
      run: npm test
      working-directory: cli
    
    - name: SDK Tests
      run: npm test
      working-directory: sdk
    
    - name: Lint Tests
      run: npm test
      working-directory: lint
    
    - name: Graph Tests
      run: npm test
      working-directory: graph
    
    - name: Context Tests
      run: npm test
      working-directory: context
    
    - name: Compatibility Tests
      run: node --test compatibility/v0.1-cli.test.js compatibility/v0.1-runtime.test.js compatibility/v0.1-sdk.test.js compatibility/v0.2-context.test.js compatibility/v0.2-graph.test.js
    
    - name: Snapshot Tests
      run: node --test tests/snapshots/snapshot.test.js
    
    - name: Security Tests
      run: node --test security/fuzz/tests/security.test.js
    
    - name: Documentation Validation
      run: node scripts/validate-docs.js
    
    - name: VitePress Build
      run: npx vitepress build website

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run Performance Benchmarks (Informational)
      run: node benchmarks/run-benchmarks.js
      continue-on-error: true
    
    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-${{ github.sha }}
        path: benchmarks/results/
        retention-days: 30
