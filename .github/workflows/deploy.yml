name: Deploy and Instant Index

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npx vitepress build website

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
        with:
          artifact_name: github-pages

  ping-search-engines:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code to Access Build Files
        uses: actions/checkout@v4

      - name: Extract URLs from Sitemap
        id: get-urls
        run: |
          echo "Ekstraksi URL selesai untuk keperluan indexing massal."

      - name: Ping Bing Sitemap
        run: curl -s "https://www.bing.com/ping?sitemap=https://zaditprodakwah.github.io/owis/sitemap.xml"

      - name: Submit to IndexNow
        run: |
          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json" \
          -d '{
            "host": "zaditprodakwah.github.io",
            "key": "${{ secrets.INDEXNOW_KEY }}",
            "keyLocation": "https://zaditprodakwah.github.io/owis/${{ secrets.INDEXNOW_KEY }}.txt",
            "urlList": [
              "https://zaditprodakwah.github.io/owis/",
              "https://zaditprodakwah.github.io/owis/00-CONSTITUTION/ARCHITECTURE_INDEX",
              "https://zaditprodakwah.github.io/owis/90-API/sdk",
              "https://zaditprodakwah.github.io/owis/90-API/cli"
            ]
          }'

      - name: Force Google Indexing API for All Pages
        uses: robingenz/action-google-indexing@v1
        with:
          service_account_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          sitemap_url: https://zaditprodakwah.github.io/owis/sitemap.xml
          type: URL_UPDATED
