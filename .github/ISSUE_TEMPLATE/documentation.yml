name: Documentation Issue
description: Report errors, omissions, or suggest improvements to the documentation
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Please refer to our [Documentation Contribution Guidelines](../CONTRIBUTING.md) before submitting documentation changes.
  - type: textarea
    id: issue
    attributes:
      label: Description of the Documentation Issue
      description: What is wrong, missing, or unclear in the documentation?
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Page URL or File Path
      description: The page URL (e.g., https://zaditprodakwah.github.io/owis/) or file path (e.g., `docs/90-API/sdk.md`)
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Fix
      description: Do you have a suggestion on how to improve it?
